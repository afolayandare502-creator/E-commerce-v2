<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(70, 88, 255, 0.09), transparent 32%),
                radial-gradient(circle at bottom right, rgba(12, 181, 160, 0.11), transparent 28%),
                #f5f7fb;
            color: #101322;
        }

        .admin-login-card {
            width: min(100%, 420px);
            background: #fff;
            border: 1px solid #e8ebf3;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(16, 19, 34, 0.12);
            padding: 32px;
        }

        .admin-login-card h1 {
            margin: 0 0 8px;
            font-size: 28px;
            line-height: 1.1;
        }

        .admin-login-card p {
            margin: 0 0 24px;
            color: #647089;
            font-size: 14px;
        }

        .admin-login-form {
            display: grid;
            gap: 16px;
        }

        .admin-login-form label {
            display: grid;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #30384f;
        }

        .admin-login-form input {
            width: 100%;
            height: 48px;
            border: 1px solid #d9dfed;
            border-radius: 14px;
            padding: 0 14px;
            font-size: 14px;
            color: #101322;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .admin-login-form input:focus {
            border-color: #3440ff;
            box-shadow: 0 0 0 4px rgba(52, 64, 255, 0.12);
        }

        .admin-login-btn {
            height: 50px;
            border: 0;
            border-radius: 14px;
            background: #101322;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .admin-login-feedback {
            min-height: 18px;
            margin: 4px 0 0;
            color: #d52c52;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <section class="admin-login-card">
        <h1>Admin Panel</h1>
        <p>Private access only.</p>

        <form id="admin-login-form" class="admin-login-form">
            <label>
                Email Address
                <input id="admin-email" type="email" placeholder="admin@brand.com" required>
            </label>

            <label>
                Password
                <input id="admin-password" type="password" placeholder="Enter your password" required>
            </label>

            <button type="submit" class="admin-login-btn">Login</button>
            <p id="admin-login-feedback" class="admin-login-feedback"></p>
        </form>
    </section>

    <script src="../../JS/Admin/admin-login.js"></script>
</body>
</html>
